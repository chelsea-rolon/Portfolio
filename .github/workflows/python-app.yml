name: Python application

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Install dependencies
      shell: bash
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        if [ -f "python projects/requirements.txt" ]; then
          pip install -r "python projects/requirements.txt"
        elif [ -f requirements.txt ]; then
          pip install -r requirements.txt
        fi

    - name: Lint maintained Python apps
      run: |
        flake8 \
          "python projects/karaoke sign up/app.py" \
          "python projects/expense tracker stuff/app.py" \
          "python projects/expense tracker stuff/statement_processor.py" \
          --count --select=E9,F63,F7,F82 --show-source --statistics

    - name: Validate app entry points
      run: |
        python -m py_compile "python projects/karaoke sign up/app.py"
        python -m py_compile "python projects/expense tracker stuff/app.py"

    - name: Run pytest when tests exist
      shell: bash
      run: |
        if find . -type f \( -name 'test_*.py' -o -name '*_test.py' \) | grep -q .; then
          pytest
        else
          echo "No pytest test files found; skipping test run."
        fi
